<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pablo e Maria – Convites da Madu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fdf4ee;--blush:#d4a090;--rose:#b85c3a;
  --sage:#9e6b50;--dark:#2c1a12;--gold:#c4702a;
  --paper:#fdf0e8;--paper2:#f5e0d2;
}
html,body{
  width:100%;height:100%;margin:0;
  background:#b8927a;
  display:flex;align-items:center;justify-content:center;
  font-family:'Jost',sans-serif;font-weight:300;
  overflow:hidden;
  -webkit-user-select:none;user-select:none;
}
.scene{
  width:min(520px,96vw);
  height:min(680px,93vh);
  position:relative;
  perspective:1600px;
}
.stack2{position:absolute;inset:0;transform:translate(8px,6px);background:#c9967a;border-radius:3px 10px 10px 3px;box-shadow:6px 8px 28px rgba(0,0,0,.15);z-index:0;}
.stack1{position:absolute;inset:0;transform:translate(4px,3px);background:var(--paper2);border-radius:3px 10px 10px 3px;box-shadow:5px 5px 20px rgba(0,0,0,.18);z-index:1;}
.page{
  position:absolute;inset:0;z-index:2;
  background:var(--paper);
  border-radius:3px 10px 10px 3px;
  box-shadow:3px 3px 22px rgba(0,0,0,.22);
  overflow:hidden;
}
.page::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:22px;
  background:linear-gradient(to right,rgba(0,0,0,.09),transparent);
  pointer-events:none;z-index:10;
}
.leaf{
  position:absolute;inset:0;z-index:20;
  background:var(--paper);
  border-radius:3px 10px 10px 3px;
  box-shadow:3px 3px 22px rgba(0,0,0,.22);
  overflow:hidden;
  transform-origin:left center;
  visibility:hidden;
  pointer-events:none;
}
.leaf::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:22px;
  background:linear-gradient(to right,rgba(0,0,0,.09),transparent);
  pointer-events:none;z-index:10;
}
.leaf::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:16px;
  background:linear-gradient(to left,rgba(0,0,0,.07),transparent);
  pointer-events:none;z-index:10;
}
.page-content,.leaf-content{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:52px 44px;text-align:center;
  position:relative;z-index:5;
}
.tag{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--sage);margin-bottom:22px;}
.hero-names{font-family:'Cormorant Garamond',serif;font-size:clamp(50px,11vw,78px);font-weight:300;font-style:italic;line-height:.95;color:var(--dark);}
.hero-amp{color:var(--rose);font-size:.58em;display:block;line-height:1.3;}
.divider{width:44px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:18px auto;}
.hero-date{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--rose);}
.ornament{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--blush);letter-spacing:10px;margin:10px 0;}
.section-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--sage);margin-bottom:12px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5.5vw,36px);font-weight:300;font-style:italic;color:var(--dark);line-height:1.2;margin-bottom:14px;}
.section-body{font-size:clamp(11px,2.5vw,13px);line-height:1.9;color:var(--dark);opacity:.72;}
.detail-block{margin-top:14px;padding:12px 16px;border:1px solid var(--blush);border-radius:2px;width:100%;}
.detail-title{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,3.5vw,18px);font-style:italic;color:var(--rose);margin-bottom:5px;}
.detail-body{font-size:clamp(10px,2.2vw,12px);line-height:1.8;opacity:.7;}
.timeline{width:100%;margin-top:10px;}
.tl-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;text-align:left;}
.tl-line{display:flex;flex-direction:column;align-items:center;padding-top:4px;gap:3px;flex-shrink:0;}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--rose);}
.tl-tail{width:1px;flex:1;background:var(--blush);min-height:14px;}
.tl-time{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.tl-event{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,3.5vw,17px);font-style:italic;color:var(--dark);}
.rsvp-btn{display:inline-block;margin-top:16px;padding:10px 28px;border:1px solid var(--rose);font-size:9px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;color:var(--rose);font-family:'Jost',sans-serif;background:transparent;transition:background .2s,color .2s;}
.rsvp-btn:hover{background:var(--rose);color:#fff;}
.madu{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--sage);opacity:.5;margin-top:14px;}
.pg-num{position:absolute;bottom:16px;right:20px;font-size:9px;letter-spacing:2px;color:var(--sage);opacity:.45;}
.nav{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:200;}
.nd{width:6px;height:6px;border-radius:50%;background:rgba(46,37,32,.22);cursor:pointer;transition:background .3s,transform .3s;}
.nd.on{background:var(--rose);transform:scale(1.4);}
.arrow{position:fixed;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(253,247,239,.92);border:1px solid var(--blush);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:200;font-size:14px;color:var(--dark);box-shadow:0 2px 10px rgba(0,0,0,.12);transition:opacity .3s,background .2s;}
.arrow:hover{background:var(--cream);}
.arrow.off{opacity:0;pointer-events:none;}
#ap{right:calc(50% + min(260px,48vw) + 14px);}
#an{left:calc(50% + min(260px,48vw) + 14px);}

<body>

<div class="scene" id="scene">
  <div class="stack2"></div>
  <div class="stack1"></div>
  <div class="page" id="page"><div class="page-content" id="pageC"></div></div>
  <div class="leaf" id="leaf"><div class="leaf-content"  id="leafC"></div></div>
</div>

<div class="nav" id="nav"></div>
<div class="arrow off" id="ap">&#8592;</div>
<div class="arrow"     id="an">&#8594;</div>

<script>
const PAGES=[
  `<p class="tag">Convites da Madu · Casamento</p>
   <div class="hero-names">Pablo<span class="hero-amp">&amp;</span>Maria</div>
   <div class="divider"></div>
   <p class="hero-date">22 · Novembro · 2025</p>
   <p class="ornament" style="margin-top:16px">✦ ✦ ✦</p>
   <p class="section-body" style="font-style:italic;margin-top:4px">Juntos para sempre</p>
   <span class="pg-num">I</span>`,

  `<p class="section-label">Com amor</p>
   <div class="section-title">Dois corações,<br>uma história</div>
   <p class="section-body">Com imensa alegria, convidamos você para celebrar conosco o momento mais especial de nossas vidas.</p>
   <div class="detail-block" style="margin-top:20px">
     <div class="detail-title">Cerimônia</div>
     <div class="detail-body">22 de novembro de 2025 · 17h00<br>Igreja Nossa Senhora das Graças<br>São Paulo · SP</div>
   </div>
   <span class="pg-num">2</span>`,

  `<p class="section-label">Festa</p>
   <div class="section-title">Recepção<br>&amp; Traje</div>
   <div class="detail-block">
     <div class="detail-title">Recepção</div>
     <div class="detail-body">A partir das 19h30<br>Espaço Jardim Secreto<br>Rua das Flores, 210 · São Paulo</div>
   </div>
   <div class="detail-block" style="margin-top:12px">
     <div class="detail-title">Traje</div>
     <div class="detail-body">Esporte fino<br><span style="color:var(--sage)">Paleta: verde, bege e terracota</span></div>
   </div>
   <span class="pg-num">3</span>`,

  `<p class="section-label">Programação</p>
   <div class="section-title" style="margin-bottom:16px">O grande dia</div>
   <div class="timeline">
     <div class="tl-row"><div class="tl-line"><div class="tl-dot"></div><div class="tl-tail"></div></div><div><div class="tl-time">17:00</div><div class="tl-event">Cerimônia religiosa</div></div></div>
     <div class="tl-row"><div class="tl-line"><div class="tl-dot"></div><div class="tl-tail"></div></div><div><div class="tl-time">18:30</div><div class="tl-event">Sessão de fotos</div></div></div>
     <div class="tl-row"><div class="tl-line"><div class="tl-dot"></div><div class="tl-tail"></div></div><div><div class="tl-time">19:30</div><div class="tl-event">Coquetel de boas-vindas</div></div></div>
     <div class="tl-row"><div class="tl-line"><div class="tl-dot"></div><div class="tl-tail"></div></div><div><div class="tl-time">21:00</div><div class="tl-event">Jantar &amp; festa</div></div></div>
     <div class="tl-row"><div class="tl-line"><div class="tl-dot"></div></div><div><div class="tl-time">00:30</div><div class="tl-event">Balada</div></div></div>
   </div>
   <span class="pg-num">4</span>`,

  `<p class="section-label">Confirmação</p>
   <div class="section-title">Confirme sua<br>presença</div>
   <p class="section-body">Pedimos gentilmente que confirme até<br><strong style="color:var(--rose)">22 de outubro de 2025.</strong></p>
   <a class="rsvp-btn" href="https://wa.me/5500000000000" target="_blank">Confirmar presença</a>
   <div class="divider" style="margin-top:22px"></div>
   <p class="ornament">✦ ✦ ✦</p>
   <p class="madu">Convites da Madu · 2025</p>
   <span class="pg-num">V</span>`
];

const N=PAGES.length, DUR=500, THRESH=50;
let cur=0, busy=false;

const scene = document.getElementById('scene');
const pageC = document.getElementById('pageC');
const leafEl= document.getElementById('leaf');
const leafC = document.getElementById('leafC');
const navEl = document.getElementById('nav');
const btnP  = document.getElementById('ap');
const btnN  = document.getElementById('an');

/*
  BACKWARD que funciona:
    leaf = PAGES[cur-1], começa em rotateY(-90deg), anima até rotateY(0deg)
    ao fim: page=cur-1, leaf some

  FORWARD — mesma lógica espelhada:
    leaf = PAGES[cur], começa em rotateY(0deg), anima até rotateY(-90deg)  <-- SAINDO pela esquerda
    page por baixo = PAGES[cur+1] já visível
    ao fim: cur++, leaf some

  DRAG BACKWARD:
    dx positivo (arrastar direita): angle = -90 + (dx/W)*90  →  de -90 até 0

  DRAG FORWARD — mesma proporção mas partindo de 0 indo para -90:
    dx negativo (arrastar esquerda): angle = 0 + (dx/W)*90   →  de 0 até -90
    (dx é negativo então vai ficando mais negativo)
*/


function botanical(){
  return '<div class="flower-corner"></div><div class="flower-corner-bl"></div>';
}

function setPage(idx){ pageC.innerHTML=PAGES[idx]+botanical(); }

function leafShow(angle, html){
  leafC.innerHTML=html+botanical();
  leafEl.style.transition='none';
  leafEl.style.transform=`rotateY(${angle}deg)`;
  leafEl.style.visibility='visible';
  // força reflow para garantir que transition:none foi aplicado
  leafEl.getBoundingClientRect();
}

function leafMove(angle){
  leafEl.style.transition='none';
  leafEl.style.transform=`rotateY(${angle}deg)`;
}

function leafAnim(toAngle, dur, cb){
  leafEl.style.transition=`transform ${dur}ms cubic-bezier(.4,0,.2,1)`;
  leafEl.style.transform=`rotateY(${toAngle}deg)`;
  setTimeout(()=>{ leafEl.style.transition='none'; cb&&cb(); }, dur+16);
}

function leafHide(){
  leafEl.style.visibility='hidden';
  leafEl.style.transition='none';
}

function updateUI(){
  document.querySelectorAll('.nd').forEach((d,i)=>d.classList.toggle('on',i===cur));
  btnP.classList.toggle('off',cur===0);
  btnN.classList.toggle('off',cur===N-1);
}

/* ── botões/teclado ── */
function flipFwd(){
  if(busy||cur>=N-1) return;
  busy=true;
  setPage(cur+1);
  leafShow(0, PAGES[cur]);
  leafAnim(-90, DUR, ()=>{ cur++; leafHide(); updateUI(); busy=false; });
}

function flipBwd(){
  if(busy||cur<=0) return;
  busy=true;
  leafShow(-90, PAGES[cur-1]);
  leafAnim(0, DUR, ()=>{ cur--; setPage(cur); leafHide(); updateUI(); busy=false; });
}

/* ── drag ── */
let pressing=false, dragging=false, dragDir=0, startX=0;

function onDown(x){
  if(busy) return;
  pressing=true; dragging=false; dragDir=0; startX=x;
}

function onMove(x){
  if(!pressing||busy) return;
  const dx=x-startX;

  if(!dragging){
    if(Math.abs(dx)<2) return;
    dragging=true;
    dragDir=dx<0?1:-1;

    if(dragDir===1&&cur>=N-1){ pressing=false; return; }
    if(dragDir===-1&&cur<=0) { pressing=false; return; }

    if(dragDir===1){
      // forward: page=next por baixo, leaf=cur começa em 0
      setPage(cur+1);
      leafShow(0, PAGES[cur]);
    } else {
      // backward: leaf=prev começa em -90
      leafShow(-90, PAGES[cur-1]);
    }
  }

  const W=scene.offsetWidth*0.75;
  let angle;
  if(dragDir===1){
    // dx negativo → angle vai de 0 até -90
    angle=Math.max(-90, Math.min(0, (dx/W)*90));
  } else {
    // dx positivo → angle vai de -90 até 0
    angle=Math.max(-90, Math.min(0, -90+(dx/W)*90));
  }
  leafMove(angle);
}

function onUp(x){
  if(!pressing) return;
  const dx=x-startX;
  pressing=false;

  if(!dragging){ leafHide(); return; }
  dragging=false;

  const committed=Math.abs(dx)>THRESH;
  const sd=DUR*0.4;

  if(dragDir===1){
    if(committed&&cur<N-1){
      busy=true;
      leafAnim(-90, sd, ()=>{ cur++; leafHide(); updateUI(); busy=false; });
    } else {
      leafAnim(0, sd, ()=>{ setPage(cur); leafHide(); });
    }
  } else {
    if(committed&&cur>0){
      busy=true;
      leafAnim(0, sd, ()=>{ cur--; setPage(cur); leafHide(); updateUI(); busy=false; });
    } else {
      leafAnim(-90, sd, ()=>{ leafHide(); });
    }
  }
}

scene.addEventListener('mousedown',   e=>{ e.preventDefault(); onDown(e.clientX); });
document.addEventListener('mousemove',e=>onMove(e.clientX));
document.addEventListener('mouseup',  e=>onUp(e.clientX));

scene.addEventListener('touchstart',  e=>{ e.preventDefault(); onDown(e.touches[0].clientX); },{passive:false});
document.addEventListener('touchmove',e=>onMove(e.touches[0].clientX),{passive:true});
document.addEventListener('touchend', e=>onUp(e.changedTouches[0].clientX),{passive:true});

btnP.addEventListener('click',flipBwd);
btnN.addEventListener('click',flipFwd);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') flipFwd();
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   flipBwd();
});

function buildNav(){
  navEl.innerHTML='';
  PAGES.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='nd'+(i===0?' on':'');
    d.addEventListener('click',()=>{
      if(i===cur||busy) return;
      const step=i>cur?1:-1;
      function go(){ if(busy){setTimeout(go,80);return;} if(i!==cur){step===1?flipFwd():flipBwd();} if(i!==cur){setTimeout(go,DUR+60);} }
      go();
    });
    navEl.appendChild(d);
  });
}

setPage(0);
buildNav();
updateUI();
</script>
</body>
</html>
